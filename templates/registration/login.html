{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}ورود - سیستم هوشمند تایتان{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="glass-card p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-r from-primary to-secondary rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-user text-3xl text-white"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">ورود به حساب کاربری</h2>
            <p class="text-gray-500 mt-2">لطفاً اطلاعات خود را وارد کنید</p>
        </div>
        
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn-primary text-white w-full py-3 rounded-lg font-semibold mt-4">
                ورود
            </button>
        </form>
        
        {% comment %} <div class="text-center mt-6">
            <p class="text-gray-600">حساب کاربری ندارید؟ 
                <a href="#" class="text-primary hover:underline">ثبت‌نام</a>
            </p>
        </div> {% endcomment %}
    </div>
</div>
{% endblock %}
